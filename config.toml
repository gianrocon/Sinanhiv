[defaults]
# Campos editaveis com valor padrao — aparecem no formulario pre-preenchidos

# Campo 6: Nome e codigo CNES da unidade de saude notificadora
unidade_saude = "CTA Marymar Novaes"
codigo_unidade_saude = "0072"

# Campos 17-18: UF e municipio de residencia
uf_residencia = "BA"
municipio_residencia = "SALVADOR"

[fixed]
# Campos ocultos — nao aparecem no formulario, injetados automaticamente
uf_notificacao = "BA"
municipio_notificacao = "Salvador"
ibge_municipio_notif = "292740"

[app]
# Tamanho da fonte no PDF (ajuste se o texto nao couber nos campos)
font_size = 13
# Tamanho da fonte especifico para campos de data (dd/mm/aaaa)
font_size_date = 13
# Tamanho da fonte para campos numericos com fundo branco (codigo, ibge, cep, telefone, cartao)
font_size_number = 13
# Fonte: "helv" = Helvetica, "cour" = Courier (monoespacada)
font_name = "helv"
